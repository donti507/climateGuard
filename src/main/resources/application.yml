spring:
  profiles:
    active: dev
  application:
    name: climateguard-api
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:climateguard-super-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm}
  expiration: 86400000

cors:
  # Comma-separated list of allowed origins. Never use "*" together with
  # allowCredentials(true) — that combination allows any site to make
  # authenticated requests against this API. Override via CORS_ALLOWED_ORIGINS
  # in each environment (e.g. your real frontend domain in prod).
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:climateguard}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
